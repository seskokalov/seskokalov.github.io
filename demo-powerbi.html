<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Executive Sales Dashboard — PhiloStack Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1219;--bg2:#161b27;--bg3:#1c2233;--bg4:#232a3c;--border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.1);
  --t1:#e8eaf0;--t2:#8a90a5;--t3:#555b72;--accent:#1a5cff;--accent-s:rgba(26,92,255,.1);
  --green:#22c55e;--green-s:rgba(34,197,94,.12);--red:#ef4444;--red-s:rgba(239,68,68,.1);
  --gold:#c4922a;--gold-s:rgba(196,146,42,.12);--yellow:#eab308;--purple:#8b5cf6;--orange:#f59e0b;
  --r:10px;--rs:7px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased}
.app{display:flex;flex-direction:column;height:100vh}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:14px;padding:0 20px;height:48px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;z-index:100}
.tb-logo{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--t1);margin-right:8px}
.tb-logo-mark{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:12px;color:#fff;position:relative}
.tb-logo-mark::after{content:'';position:absolute;inset:0;border-radius:7px;background:linear-gradient(135deg,rgba(255,255,255,.18)0%,transparent 50%)}
.tb-logo-text{font-weight:600;font-size:14px;letter-spacing:-.2px}.tb-logo-text span{color:var(--accent)}
.tb-title{font-family:'DM Serif Display',serif;font-size:15px;font-weight:400;letter-spacing:-.3px;white-space:nowrap}
.tb-sep{width:1px;height:24px;background:var(--border);flex-shrink:0}
.tb-spacer{flex:1}

/* Date picker */
.date-pick{position:relative}
.date-btn{display:flex;align-items:center;gap:6px;padding:5px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);color:var(--t2);font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;transition:all .2s;font-weight:500}
.date-btn:hover{border-color:var(--border2);color:var(--t1)}
.date-btn svg{width:13px;height:13px;opacity:.5}
.date-drop{position:absolute;top:calc(100% + 6px);right:0;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:4px;min-width:160px;box-shadow:0 8px 32px rgba(0,0,0,.4);opacity:0;transform:translateY(-6px);pointer-events:none;transition:all .2s;z-index:200}
.date-drop.open{opacity:1;transform:translateY(0);pointer-events:auto}
.date-opt{padding:7px 12px;border-radius:var(--rs);font-size:11.5px;color:var(--t2);cursor:pointer;transition:all .15s;font-weight:500}
.date-opt:hover{background:var(--accent-s);color:var(--t1)}
.date-opt.active{background:var(--accent-s);color:var(--accent);font-weight:600}

/* Toolbar buttons */
.tb-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;background:transparent;border:1px solid var(--border);border-radius:var(--rs);color:var(--t2);font-size:11px;font-weight:500;font-family:'Outfit',sans-serif;cursor:pointer;transition:all .2s;white-space:nowrap}
.tb-btn:hover{background:var(--bg3);color:var(--t1);border-color:var(--border2)}
.tb-btn svg{width:13px;height:13px}
.tb-btn.spinning svg{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Export dropdown */
.export-wrap{position:relative}
.export-drop{position:absolute;top:calc(100% + 6px);right:0;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:4px;min-width:150px;box-shadow:0 8px 32px rgba(0,0,0,.4);opacity:0;transform:translateY(-6px);pointer-events:none;transition:all .2s;z-index:200}
.export-drop.open{opacity:1;transform:translateY(0);pointer-events:auto}

.tb-back{color:var(--t3);text-decoration:none;font-size:11px;font-weight:500;display:flex;align-items:center;gap:4px;transition:color .2s;white-space:nowrap}
.tb-back:hover{color:var(--accent)}
.tb-back svg{width:12px;height:12px}

/* PROGRESS BAR */
.progress-bar{height:2px;background:transparent;position:relative;flex-shrink:0}
.progress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--green));transition:width .3s}
.progress-bar.active{background:rgba(255,255,255,.02)}

/* FILTERS */
.filters{display:flex;align-items:center;gap:8px;padding:10px 20px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.filter-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);font-weight:600;margin-right:4px}
.filter-wrap{position:relative}
.filter-btn{display:flex;align-items:center;gap:5px;padding:5px 11px;background:var(--bg3);border:1px solid var(--border);border-radius:50px;font-size:11px;font-weight:500;color:var(--t2);cursor:pointer;transition:all .2s;font-family:'Outfit',sans-serif;white-space:nowrap}
.filter-btn:hover{border-color:var(--border2);color:var(--t1)}
.filter-btn.active{background:var(--accent-s);border-color:rgba(26,92,255,.2);color:var(--accent)}
.filter-btn svg{width:10px;height:10px;opacity:.4}
.filter-drop{position:absolute;top:calc(100% + 4px);left:0;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:4px;min-width:150px;box-shadow:0 8px 32px rgba(0,0,0,.4);opacity:0;transform:translateY(-6px);pointer-events:none;transition:all .2s;z-index:200}
.filter-drop.open{opacity:1;transform:translateY(0);pointer-events:auto}
.filter-opt{padding:6px 12px;border-radius:var(--rs);font-size:11px;color:var(--t2);cursor:pointer;transition:all .15s}
.filter-opt:hover{background:var(--accent-s);color:var(--t1)}
.filter-opt.active{color:var(--accent);font-weight:600}
.filter-reset{padding:5px 11px;background:transparent;border:1px solid var(--border);border-radius:50px;font-size:10px;color:var(--t3);cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s;font-weight:500;margin-left:auto}
.filter-reset:hover{color:var(--red);border-color:rgba(239,68,68,.2)}

/* MAIN */
.main{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 20px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.06) transparent}
.main::-webkit-scrollbar{width:5px}.main::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:3px}

/* KPI ROW */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);transform:scaleX(0);transform-origin:left;transition:transform .3s}
.kpi:hover{border-color:var(--border2);background:var(--bg3)}
.kpi:hover::after{transform:scaleX(1)}
.kpi.selected{border-color:rgba(26,92,255,.3);box-shadow:0 0 0 1px rgba(26,92,255,.15)}
.kpi.selected::after{transform:scaleX(1)}
.kpi-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.kpi-label{font-size:10.5px;color:var(--t3);font-weight:500;letter-spacing:.02em}
.kpi-trend{display:flex;align-items:center;gap:2px;font-size:10px;font-weight:600;padding:1px 6px;border-radius:50px}
.kpi-trend.up{color:var(--green);background:var(--green-s)}.kpi-trend.down{color:var(--red);background:var(--red-s)}
.kpi-trend svg{width:8px;height:8px}
.kpi-val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;letter-spacing:-.5px;line-height:1;margin-bottom:8px}
.kpi-spark{height:24px;display:flex;align-items:flex-end;gap:2px}
.kpi-spark-bar{flex:1;border-radius:1.5px;min-height:2px;transition:height .5s cubic-bezier(.34,1.56,.64,1)}

/* CHARTS GRID */
.charts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:all .3s;position:relative}
.chart-card:hover{border-color:var(--border2)}
.chart-card.expanded{position:fixed;inset:60px 20px 20px;z-index:300;border-radius:var(--r);box-shadow:0 20px 60px rgba(0,0,0,.5)}
.cc-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 0}
.cc-title{font-size:12px;font-weight:600;letter-spacing:-.1px}
.cc-actions{display:flex;gap:4px}
.cc-btn{width:24px;height:24px;border-radius:var(--rs);border:none;background:transparent;color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cc-btn:hover{background:var(--bg4);color:var(--t1)}
.cc-btn svg{width:12px;height:12px}
.cc-body{padding:12px 16px 16px;position:relative}

/* Line chart */
.line-wrap{position:relative;height:200px}
.line-wrap svg{width:100%;height:100%}
.line-toggle{display:flex;gap:2px;background:var(--bg);border-radius:5px;padding:2px}
.line-tog-btn{padding:3px 10px;border-radius:4px;font-size:10px;font-weight:500;color:var(--t3);cursor:pointer;border:none;background:transparent;font-family:'Outfit',sans-serif;transition:all .15s}
.line-tog-btn.active{background:var(--bg3);color:var(--t1)}
.line-tooltip{position:absolute;pointer-events:none;background:var(--t1);color:var(--bg);padding:5px 10px;border-radius:5px;font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:600;white-space:nowrap;opacity:0;transition:opacity .15s;z-index:10;transform:translate(-50%,-100%);margin-top:-10px}
.line-tooltip::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);border-left:4px solid transparent;border-right:4px solid transparent;border-top:4px solid var(--t1)}
.line-crosshair{position:absolute;top:0;bottom:0;width:1px;background:rgba(255,255,255,.1);pointer-events:none;opacity:0;transition:opacity .1s}
.line-dot{position:absolute;width:8px;height:8px;border-radius:50%;background:var(--accent);border:2px solid var(--bg2);pointer-events:none;opacity:0;transition:opacity .1s;transform:translate(-50%,-50%)}

/* Horizontal bars */
.hbar-row{display:flex;align-items:center;gap:10px;padding:6px 0;cursor:pointer;transition:opacity .2s}
.hbar-row.dimmed{opacity:.3}
.hbar-label{width:80px;font-size:11px;color:var(--t2);font-weight:500;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hbar-track{flex:1;height:22px;background:rgba(255,255,255,.03);border-radius:3px;overflow:hidden;position:relative}
.hbar-fill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.34,1.56,.64,1);position:relative;cursor:pointer}
.hbar-val{width:65px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t2);font-weight:500;text-align:right}
.hbar-fill-tip{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-family:'JetBrains Mono',monospace;font-size:9px;color:rgba(255,255,255,.7);font-weight:600;opacity:0;transition:opacity .2s}
.hbar-fill:hover .hbar-fill-tip{opacity:1}

/* Donut */
.donut-wrap{display:flex;align-items:center;justify-content:center;gap:24px;height:200px}
.donut-svg{width:160px;height:160px;flex-shrink:0;position:relative}
.donut-svg svg{width:100%;height:100%}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
.donut-center-val{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;line-height:1}
.donut-center-lbl{font-size:9px;color:var(--t3);margin-top:1px}
.donut-legend{display:flex;flex-direction:column;gap:8px}
.donut-leg-item{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--t2);cursor:pointer;padding:3px 6px;border-radius:4px;transition:all .15s}
.donut-leg-item:hover{background:rgba(255,255,255,.03);color:var(--t1)}
.donut-leg-item.active{background:var(--accent-s);color:var(--accent)}
.donut-leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.donut-leg-val{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:var(--t1)}

/* Heatmap */
.heatmap-wrap{overflow-x:auto}
.heatmap{display:grid;grid-template-columns:40px repeat(12,1fr);gap:2px;min-width:400px}
.hm-label{font-family:'JetBrains Mono',monospace;font-size:8.5px;color:var(--t3);display:flex;align-items:center;justify-content:center;font-weight:500}
.hm-label.col{padding-bottom:2px}
.hm-cell{aspect-ratio:1;border-radius:3px;cursor:pointer;transition:all .15s;position:relative;min-height:18px}
.hm-cell:hover{transform:scale(1.15);z-index:2;box-shadow:0 0 0 1px rgba(255,255,255,.2)}
.hm-tip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--t1);color:var(--bg);padding:3px 8px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;z-index:10}
.hm-cell:hover .hm-tip{opacity:1}

/* TABLE */
.table-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.table-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}
.table-head h3{font-size:12px;font-weight:600}
.table-meta{font-size:10px;color:var(--t3)}
table.dt{width:100%;border-collapse:collapse}
.dt th{text-align:left;padding:8px 16px;font-size:9.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);font-weight:600;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;transition:color .15s;white-space:nowrap;background:rgba(255,255,255,.01)}
.dt th:hover{color:var(--t1)}
.dt th.sorted{color:var(--accent)}
.dt th .sort-arrow{display:inline-block;margin-left:3px;font-size:8px;opacity:.4}
.dt th.sorted .sort-arrow{opacity:1}
.dt td{padding:9px 16px;font-size:12px;border-bottom:1px solid var(--border);transition:background .15s}
.dt tr:last-child td{border-bottom:none}
.dt tbody tr{cursor:pointer;transition:background .1s}
.dt tbody tr:hover td{background:rgba(255,255,255,.02)}
.dt .mono{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500}
.dt .rank{width:36px;color:var(--t3);font-weight:600}
.dt .margin-bar{display:inline-flex;align-items:center;gap:6px}
.dt .margin-track{width:40px;height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.dt .margin-fill{height:100%;border-radius:2px}

/* TOAST */
.toast-box{position:fixed;top:58px;right:20px;z-index:500;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);font-size:11.5px;color:var(--t1);box-shadow:0 8px 32px rgba(0,0,0,.3);pointer-events:auto;animation:toastIn .3s ease-out;max-width:320px;backdrop-filter:blur(12px)}
.toast.out{animation:toastOut .25s ease-in forwards}
@keyframes toastIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastOut{to{opacity:0;transform:translateX(30px)}}
.toast-i{width:18px;height:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.toast-i svg{width:11px;height:11px}
.toast-i.g{background:var(--green-s);color:var(--green)}.toast-i.b{background:var(--accent-s);color:var(--accent)}.toast-i.r{background:var(--red-s);color:var(--red)}.toast-i.o{background:var(--gold-s);color:var(--gold)}
.toast-t{flex:1;line-height:1.35}.toast-t strong{font-weight:600}
.toast-x{background:none;border:none;color:var(--t3);cursor:pointer;font-size:14px;padding:0 2px;transition:color .15s}
.toast-x:hover{color:var(--t1)}

/* EXPAND OVERLAY */
.expand-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:299;opacity:0;pointer-events:none;transition:opacity .3s}
.expand-overlay.open{opacity:1;pointer-events:auto}

/* BUILT-BY */
.built-by{position:fixed;bottom:12px;right:16px;display:flex;align-items:center;gap:6px;padding:5px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:50px;font-size:10px;color:var(--t3);text-decoration:none;z-index:50;transition:all .25s;backdrop-filter:blur(12px)}
.built-by:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-2px)}
.built-by-d{width:5px;height:5px;background:var(--accent);border-radius:50%}

/* RESPONSIVE */
@media(max-width:1000px){.kpi-row{grid-template-columns:repeat(3,1fr)}.charts{grid-template-columns:1fr}}
@media(max-width:700px){.kpi-row{grid-template-columns:1fr 1fr}.toolbar{flex-wrap:wrap;height:auto;padding:10px 16px;gap:8px}.filters{padding:8px 16px}.main{padding:12px 16px}.tb-title,.tb-sep{display:none}.hbar-label{width:60px}}
@media(max-width:500px){.kpi-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
<!-- TOOLBAR -->
<div class="toolbar">
  <a href="index.html" class="tb-logo"><div class="tb-logo-mark">PS</div><div class="tb-logo-text">Philo<span>Stack</span></div></a>
  <div class="tb-sep"></div>
  <div class="tb-title">Executive Sales Dashboard</div>
  <div class="tb-spacer"></div>
  <div class="date-pick">
    <button class="date-btn" id="dateBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span id="dateLabel">Last 30 Days</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></button>
    <div class="date-drop" id="dateDrop">
      <div class="date-opt" data-range="Today">Today</div>
      <div class="date-opt" data-range="Last 7 Days">Last 7 Days</div>
      <div class="date-opt active" data-range="Last 30 Days">Last 30 Days</div>
      <div class="date-opt" data-range="This Quarter">This Quarter</div>
      <div class="date-opt" data-range="YTD">Year to Date</div>
    </div>
  </div>
  <button class="tb-btn" id="refreshBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>Refresh</button>
  <div class="export-wrap">
    <button class="tb-btn" id="exportBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export</button>
    <div class="export-drop" id="exportDrop">
      <div class="date-opt" data-export="pdf">Export PDF</div>
      <div class="date-opt" data-export="csv">Export CSV</div>
      <div class="date-opt" data-export="link">Copy Share Link</div>
    </div>
  </div>
  <div class="tb-sep"></div>
  <a href="index.html" class="tb-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>PhiloStack</a>
</div>
<div class="progress-bar" id="progBar"><div class="progress-fill" id="progFill"></div></div>

<!-- FILTERS -->
<div class="filters">
  <span class="filter-label">Filters:</span>
  <div class="filter-wrap" id="fStore"><button class="filter-btn" id="fStoreBtn">All Stores <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg></button>
    <div class="filter-drop" id="fStoreDrop"></div></div>
  <div class="filter-wrap" id="fCat"><button class="filter-btn" id="fCatBtn">All Categories <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg></button>
    <div class="filter-drop" id="fCatDrop"></div></div>
  <div class="filter-wrap" id="fPay"><button class="filter-btn" id="fPayBtn">All Payments <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg></button>
    <div class="filter-drop" id="fPayDrop"></div></div>
  <button class="filter-reset" id="resetFilters">Reset All</button>
</div>

<!-- MAIN -->
<div class="main">
  <!-- KPI ROW -->
  <div class="kpi-row" id="kpiRow"></div>

  <!-- CHARTS -->
  <div class="charts" id="chartsGrid">
    <div class="chart-card" id="ccLine">

// ═══ ANIMATED COUNT ═══
function animVal(el,end,duration,prefix,suffix,dec){
  prefix=prefix||'';suffix=suffix||'';dec=dec||0;
  var start=0,startT=null;
  function step(ts){
    if(!startT)startT=ts;
    var p=Math.min((ts-startT)/duration,1);
    var e=1-Math.pow(1-p,3);
    var cur=start+(end-start)*e;
    el.textContent=prefix+(dec?cur.toFixed(dec):Math.round(cur).toLocaleString())+suffix;
    if(p<1)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function renderKPIs(){
  var row=document.getElementById('kpiRow');row.innerHTML='';

    var card=document.createElement('div');card.className='kpi'+(activeKpi===k.key?' selected':'');
    var trendDir=k.up?'up':'down';
    var trendIcon=k.up?'<svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="1 7 5 3 9 7"/></svg>':'<svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="1 3 5 7 9 3"/></svg>';
    card.innerHTML='<div class="kpi-top"><div class="kpi-label">'+k.label+'</div><div class="kpi-trend '+trendDir+'">'+trendIcon+(k.up?'+':'-')+k.trend+'%</div></div><div class="kpi-val" data-v="'+k.val+'" data-p="'+k.prefix+'" data-s="'+k.suffix+'" data-d="'+(k.dec||0)+'">'+k.prefix+'0'+k.suffix+'</div><div class="kpi-spark" data-vals="'+k.sparkVals.join(',')+'" data-color="'+k.color+'"></div>';
    card.addEventListener('click',function(){
      activeKpi=activeKpi===k.key?null:k.key;
      renderKPIs();
      if(activeKpi)toast('b','<strong>'+k.label+'</strong><br>'+k.insight);
    });
    row.appendChild(card);
    // Animate
    var valEl=card.querySelector('.kpi-val');
    setTimeout(function(){animVal(valEl,k.val,900,k.prefix,k.suffix,k.dec||0)},200+i*80);
    // Sparkline
    var sparkEl=card.querySelector('.kpi-spark');
    var vals=k.sparkVals;var mx=Math.max.apply(null,vals);
    vals.forEach(function(v,j){
      var bar=document.createElement('div');bar.className='kpi-spark-bar';
      bar.style.background=k.color;bar.style.opacity=.3+(v/mx)*.7;bar.style.height='0';
      sparkEl.appendChild(bar);
      setTimeout(function(){bar.style.height=Math.round(v/mx*100)+'%'},300+i*80+j*40);
    });
  });
}
renderKPIs();

// ═══ FILTERS ═══
function buildFilter(id,btnId,dropId,options,allLabel,onSelect){
  var drop=document.getElementById(dropId);drop.innerHTML='';
  var allOpt=document.createElement('div');allOpt.className='filter-opt active';allOpt.textContent=allLabel;
  allOpt.addEventListener('click',function(){onSelect(null);drop.classList.remove('open')});
  drop.appendChild(allOpt);
  options.forEach(function(opt){
    var el=document.createElement('div');el.className='filter-opt';el.textContent=opt;
    el.addEventListener('click',function(){onSelect(opt);drop.classList.remove('open')});
    drop.appendChild(el);
  });
  document.getElementById(btnId).addEventListener('click',function(e){
    e.stopPropagation();closeAllDrops();drop.classList.toggle('open');
  });
}
function updateFilterBtn(btnId,value,allLabel){
  var btn=document.getElementById(btnId);

}

// ═══ LINE CHART ═══
function genLineData(mode){
  var pts=[];for(var i=0;i<30;i++){
    if(mode==='revenue')pts.push(jitter(4800,30));
    else pts.push(jitter(28,30));
  }return pts;
}
var lineData=genLineData('revenue');

function renderLineChart(){
  lineData=genLineData(lineMode);
  var svg=document.getElementById('lineSvg');
  var wrap=document.getElementById('lineWrap');
  var w=wrap.offsetWidth,h=wrap.offsetHeight-4;
  svg.setAttribute('viewBox','0 0 '+w+' '+h);svg.innerHTML='';
  var mx=Math.max.apply(null,lineData),mn=Math.min.apply(null,lineData);
  var pad=20,gw=w-pad*2,gh=h-pad*2;
  var pts=lineData.map(function(v,i){
    return{x:pad+i/(lineData.length-1)*gw,y:pad+(1-(v-mn)/(mx-mn||1))*gh,val:v};
  });
  // Grid lines
  for(var g=0;g<5;g++){
    var gy=pad+g/4*gh;
    var gl=document.createElementNS('http://www.w3.org/2000/svg','line');
    gl.setAttribute('x1',pad);gl.setAttribute('x2',w-pad);gl.setAttribute('y1',gy);gl.setAttribute('y2',gy);
    gl.setAttribute('stroke','rgba(255,255,255,.04)');gl.setAttribute('stroke-width','1');svg.appendChild(gl);
  }
  // Area gradient
  var defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  var grad=document.createElementNS('http://www.w3.org/2000/svg','linearGradient');
  grad.setAttribute('id','areaGrad');grad.setAttribute('x1','0');grad.setAttribute('y1','0');grad.setAttribute('x2','0');grad.setAttribute('y2','1');
  var s1=document.createElementNS('http://www.w3.org/2000/svg','stop');s1.setAttribute('offset','0%');s1.setAttribute('stop-color',lineMode==='revenue'?'#1a5cff':'#22c55e');s1.setAttribute('stop-opacity','.2');
  var s2=document.createElementNS('http://www.w3.org/2000/svg','stop');s2.setAttribute('offset','100%');s2.setAttribute('stop-color',lineMode==='revenue'?'#1a5cff':'#22c55e');s2.setAttribute('stop-opacity','0');
  grad.appendChild(s1);grad.appendChild(s2);defs.appendChild(grad);svg.appendChild(defs);
  // Build path
  var pathD='M'+pts.map(function(p){return p.x+','+p.y}).join(' L');
  var areaD=pathD+' L'+(w-pad)+','+(h-pad)+' L'+pad+','+(h-pad)+' Z';
  var area=document.createElementNS('http://www.w3.org/2000/svg','path');
  area.setAttribute('d',areaD);area.setAttribute('fill','url(#areaGrad)');svg.appendChild(area);
  var path=document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d',pathD);path.setAttribute('fill','none');path.setAttribute('stroke',lineMode==='revenue'?'#1a5cff':'#22c55e');
  path.setAttribute('stroke-width','2');path.setAttribute('stroke-linecap','round');path.setAttribute('stroke-linejoin','round');
  var totalLen=path.getTotalLength?2000:2000;
  path.style.strokeDasharray=totalLen;path.style.strokeDashoffset=totalLen;
  path.style.transition='stroke-dashoffset 1.2s ease';
  svg.appendChild(path);
  setTimeout(function(){path.style.strokeDashoffset='0'},50);

  // Hover interaction
  var ch=document.getElementById('lineCH'),dot=document.getElementById('lineDot'),tip=document.getElementById('lineTip');
  wrap.onmousemove=function(e){
    var rect=wrap.getBoundingClientRect();
    var mx2=e.clientX-rect.left;
    var idx=Math.round((mx2-pad)/gw*(lineData.length-1));
    idx=Math.max(0,Math.min(lineData.length-1,idx));
    var p=pts[idx];if(!p)return;
    ch.style.left=p.x+'px';ch.style.opacity='1';
    dot.style.left=p.x+'px';dot.style.top=p.y+'px';dot.style.opacity='1';
    dot.style.background=lineMode==='revenue'?'#1a5cff':'#22c55e';
    tip.style.left=p.x+'px';tip.style.top=(p.y-6)+'px';tip.style.opacity='1';
    var day=30-idx;
    tip.textContent=(lineMode==='revenue'?'€'+p.val.toLocaleString():p.val+' orders')+' · Mar '+(day<10?'0':'')+day;
  };
  wrap.onmouseleave=function(){ch.style.opacity='0';dot.style.opacity='0';tip.style.opacity='0'};
}
renderLineChart();

      updateFilterBtn('fStoreBtn',activeStore,'All Stores');refreshAll();

// ═══ DONUT CHART ═══
function renderDonut(){
  var svg=document.getElementById('donutSvg');svg.innerHTML='';
  var leg=document.getElementById('donutLeg');leg.innerHTML='';
  var data=categories.map(function(c,i){return{name:c,pct:jitter(catPctBase[i],10),color:catColors[i]}});
  var total=data.reduce(function(s,d){return s+d.pct},0);
  var cx=100,cy=100,r=72,sw=20,circ=2*Math.PI*r,off=0;
  data.forEach(function(d,i){
    var frac=d.pct/total,dashLen=circ*frac;
    var c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',cx);c.setAttribute('cy',cy);c.setAttribute('r',r);c.setAttribute('fill','none');
    c.setAttribute('stroke',d.color);c.setAttribute('stroke-width',sw);
    c.setAttribute('stroke-dasharray',dashLen+' '+(circ-dashLen));
    c.setAttribute('stroke-dashoffset',-off);c.setAttribute('stroke-linecap','round');
    c.style.transform='rotate(-90deg)';c.style.transformOrigin='50% 50%';
    c.style.cursor='pointer';c.style.transition='opacity .2s, stroke-width .2s';
    if(activeCat&&activeCat!==d.name){c.style.opacity='.2'}
    c.addEventListener('click',function(){activeCat=activeCat===d.name?null:d.name;updateFilterBtn('fCatBtn',activeCat,'All Categories');refreshAll()});
    c.addEventListener('mouseenter',function(){this.setAttribute('stroke-width',sw+4);document.getElementById('donutVal').textContent='€'+(Math.round(BASE.revenue*frac)/1000).toFixed(1)+'K'});
    c.addEventListener('mouseleave',function(){this.setAttribute('stroke-width',sw);document.getElementById('donutVal').textContent='€'+(BASE.revenue/1000).toFixed(0)+'K'});
    svg.appendChild(c);off+=dashLen;

    var li=document.createElement('div');li.className='donut-leg-item'+(activeCat===d.name?' active':'');
    li.innerHTML='<div class="donut-leg-dot" style="background:'+d.color+'"></div>'+d.name+'<span class="donut-leg-val">'+Math.round(frac*100)+'%</span>';
    li.addEventListener('click',function(){activeCat=activeCat===d.name?null:d.name;updateFilterBtn('fCatBtn',activeCat,'All Categories');refreshAll()});
    leg.appendChild(li);
  });
}
renderDonut();

// ═══ HEATMAP ═══
function renderHeatmap(){
  var grid=document.getElementById('heatmap');grid.innerHTML='';
  var days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  var hours=['8a','9a','10a','11a','12p','1p','2p','3p','4p','5p','6p','7p'];
  // Header row
  grid.appendChild(Object.assign(document.createElement('div'),{className:'hm-label'}));
  hours.forEach(function(h){var l=document.createElement('div');l.className='hm-label col';l.textContent=h;grid.appendChild(l)});
  days.forEach(function(day,di){
    var l=document.createElement('div');l.className='hm-label';l.textContent=day;grid.appendChild(l);
    hours.forEach(function(hour,hi){
      var base=di<5?(hi>=3&&hi<=7?80:40):(hi>=2&&hi<=6?90:30);
      var val=jitter(base,25);
      var intensity=Math.min(val/110,1);
      var cell=document.createElement('div');cell.className='hm-cell';
      cell.style.background='rgba(26,92,255,'+(.05+intensity*.55)+')';
      cell.innerHTML='<div class="hm-tip">'+day+' '+hour+' — €'+jitter(val*52,10).toLocaleString()+'</div>';
      grid.appendChild(cell);
    });
  });
}
renderHeatmap();

  {name:'Leather Belt',cat:'Accessories',units:289,rev:17340,margin:58.9},
  {name:'Cotton Polo Shirt',cat:'Dresses',units:198,rev:13860,margin:42.0}
];
var sortCol='rev',sortDir=-1;
var cols=[
  {key:'rank',label:'#',w:'36px'},
  {key:'name',label:'Product'},
  {key:'cat',label:'Category'},
  {key:'units',label:'Units Sold'},
  {key:'rev',label:'Revenue'},
  {key:'margin',label:'Margin %'}
];

function renderTable(){
  var sorted=products.slice().sort(function(a,b){
    var va=a[sortCol],vb=b[sortCol];
    if(typeof va==='string')return sortDir*va.localeCompare(vb);
    return sortDir*(va-vb);
  });
  // Head
  var thead=document.getElementById('tableHead');thead.innerHTML='';
  cols.forEach(function(c){
    var th=document.createElement('th');
    th.className=sortCol===c.key?'sorted':'';
    th.style.width=c.w||'';
    var arrow=sortCol===c.key?(sortDir===-1?'▼':'▲'):'▼';
    th.innerHTML=c.label+'<span class="sort-arrow">'+arrow+'</span>';
    th.addEventListener('click',function(){
      if(sortCol===c.key)sortDir*=-1;else{sortCol=c.key;sortDir=-1}
      renderTable();
    });
    thead.appendChild(th);
  });
  // Body
  var tbody=document.getElementById('tableBody');tbody.innerHTML='';
  sorted.forEach(function(p,i){
    var tr=document.createElement('tr');
    var mColor=p.margin>=50?'var(--green)':p.margin>=40?'var(--accent)':p.margin>=35?'var(--gold)':'var(--red)';
    tr.innerHTML='<td class="rank">'+(i+1)+'</td><td style="font-weight:600">'+p.name+'</td><td style="color:var(--t2);font-size:11.5px">'+p.cat+'</td><td class="mono">'+p.units.toLocaleString()+'</td><td class="mono">€'+p.rev.toLocaleString()+'</td><td><div class="margin-bar"><div class="margin-track"><div class="margin-fill" style="width:'+p.margin+'%;background:'+mColor+'"></div></div><span class="mono" style="font-size:10.5px">'+p.margin+'%</span></div></td>';
    tr.addEventListener('click',function(){toast('b','<strong>'+p.name+'</strong><br>'+p.units+' units · €'+p.rev.toLocaleString()+' revenue · '+p.margin+'% margin')});
    tbody.appendChild(tr);
  });
}
renderTable();

// ── AMBIENT KPI TICKING ──
// Subtly nudge KPI values up/down every few seconds
setInterval(function(){
  var kpis=document.querySelectorAll('.kpi-val');
  if(kpis.length===0)return;
  var pick=kpis[Math.floor(Math.random()*kpis.length)];
  var raw=pick.textContent.replace(/[^0-9.]/g,'');
  var num=parseFloat(raw);
  if(isNaN(num)||num===0)return;
  var pct=num>1000?0.002:0.01;
  var delta=num*pct*(Math.random()>0.4?1:-1);
  var next=Math.max(0,num+delta);
  var prefix=pick.dataset.p||'';
  var suffix=pick.dataset.s||'';
  var dec=parseInt(pick.dataset.d)||0;
  pick.textContent=prefix+next.toFixed(dec).replace(/\B(?=(\d{3})+(?!\d))/g,',')+suffix;
  pick.style.transition='color 0.4s';
  pick.style.color=delta>0?'#10b981':'#ef4444';
  setTimeout(function(){pick.style.color='';},800);
},4000);

// ── SPARKLINE REDRAW ANIMATION ──
// Periodically re-animate a random sparkline
setInterval(function(){
  var sparks=document.querySelectorAll('.kpi-spark svg polyline');
  if(sparks.length===0)return;
  var pick=sparks[Math.floor(Math.random()*sparks.length)];
  var len=pick.getTotalLength?pick.getTotalLength():100;
  pick.style.strokeDasharray=len;
  pick.style.strokeDashoffset=len;
  pick.style.transition='stroke-dash-offset 0s';
  requestAnimationFrame(function(){
    pick.style.transition='stroke-dashoffset 1.2s ease-out';
    pick.style.strokeDashoffset='0';
  });
},6000);

// ── AUTO-REFRESH INDICATOR ──
// Flash the refresh button periodically to show data is live
setInterval(function(){
  var btn=document.getElementById('refreshBtn');
  if(!btn)return;
  btn.style.transition='box-shadow 0.5s ease';
  btn.style.boxShadow='0 0 12px rgba(26,92,255,0.4)';
  setTimeout(function(){btn.style.boxShadow='none';},1000);
},15000);

})();
</script>
